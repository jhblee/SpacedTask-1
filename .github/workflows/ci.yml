name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # Build installers on version tags
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Lint + Unit Tests (fast, runs on every push/PR)
  # ──────────────────────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build shared + db packages
        run: |
          pnpm --filter=@spacedtask/shared build
          pnpm --filter=@spacedtask/db build

      - name: Unit tests (with coverage)
        run: pnpm test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            packages/shared/coverage/
            packages/db/coverage/

  # ──────────────────────────────────────────────────────────────────────────
  # Build installers (only on version tags)
  # ──────────────────────────────────────────────────────────────────────────
  build-win:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: lint-and-test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Package Windows installer
        run: pnpm package:win
        env:
          # Code signing (optional — skip if not configured)
          # CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: spacedtask-win
          path: release/*.exe

  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest
    needs: lint-and-test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Package macOS DMG
        run: pnpm package:mac
        env:
          # Code signing + notarization (optional):
          # CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: spacedtask-mac
          path: release/*.dmg

  # ──────────────────────────────────────────────────────────────────────────
  # Create GitHub Release (attach artifacts on version tags)
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-win, build-mac]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: spacedtask-win
          path: artifacts/win

      - uses: actions/download-artifact@v4
        with:
          name: spacedtask-mac
          path: artifacts/mac

      - name: Create release and upload installers
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/win/*.exe
            artifacts/mac/*.dmg
          generate_release_notes: true
