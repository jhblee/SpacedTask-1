name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Lint + Unit Tests (fast, runs on every push/PR)
  # ──────────────────────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies (skip native postinstall)
        run: npm install --ignore-scripts

      - name: Rebuild better-sqlite3 for Node.js
        run: npm rebuild better-sqlite3

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build shared + db packages
        run: |
          npm run build -w packages/shared
          npm run build -w packages/db

      - name: Unit tests with coverage
        run: npm run test --workspaces --if-present

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            packages/shared/coverage/
            packages/db/coverage/

  # ──────────────────────────────────────────────────────────────────────────
  # Build installers (only on version tags)
  # ──────────────────────────────────────────────────────────────────────────
  build-win:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: lint-and-test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Package Windows installer
        run: npm run package:win
        env:
          # Code signing (uncomment when certificate is configured):
          # CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: spacedtask-win
          path: release/*.exe

  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest
    needs: lint-and-test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Package macOS DMG
        run: npm run package:mac
        env:
          # Code signing + notarization (uncomment when configured):
          # CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: spacedtask-mac
          path: release/*.dmg

  # ──────────────────────────────────────────────────────────────────────────
  # Create GitHub Release (attach artifacts on version tags)
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-win, build-mac]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: spacedtask-win
          path: artifacts/win

      - uses: actions/download-artifact@v4
        with:
          name: spacedtask-mac
          path: artifacts/mac

      - name: Create release and upload installers
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/win/*.exe
            artifacts/mac/*.dmg
          generate_release_notes: true
