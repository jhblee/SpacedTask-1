appId: com.spacedtask.app
productName: SpacedTask
copyright: Copyright © 2024

directories:
  output: release
  buildResources: build

files:
  - apps/main/dist/**
  - apps/renderer/dist/**
  - from: node_modules/better-sqlite3
    to: apps/main/dist/node_modules/better-sqlite3
  - "!**/*.map"

extraResources:
  - from: build/icons
    to: icons

extraMetadata:
  main: apps/main/dist/index.js
  description: A spaced-repetition desktop app for reviewing tasks at optimal intervals
  author: jemsu

npmRebuild: true
nodeGypRebuild: false

asarUnpack:
  - "**/*.node"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icons/icon.ico
  # Code signing (configure via env vars):
  # CSC_LINK: path or base64 of your .pfx certificate
  # CSC_KEY_PASSWORD: certificate password

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: build/icons/icon.icns
  category: public.app-category.productivity
  # Code signing (configure via env vars):
  # CSC_LINK: path or base64 of your .p12 Developer ID certificate
  # CSC_KEY_PASSWORD: certificate password
  # APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID for notarization

dmg:
  title: SpacedTask
  window:
    width: 540
    height: 380

linux:
  target: AppImage
  category: Office

publish:
  provider: github
  releaseType: release
